services:
  db:
    image: postgres:16-alpine
    container_name: students_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: students_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d students_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pgadmin/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: students_app
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/students_db
      DB_USER: admin
      DB_PASSWORD: admin
      APP_API_BASE: /api
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: students_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "8080:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
