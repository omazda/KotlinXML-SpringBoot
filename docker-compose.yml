services:
  db:
    image: postgres:16-alpine
    container_name: spring_students_db
    environment:
      POSTGRES_DB: students_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d students_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spring_students_app
    environment:
      DB_URL: jdbc:postgresql://db:5432/students_db
      DB_USER: admin
      DB_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
