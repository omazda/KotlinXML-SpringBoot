<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Students XML Processor</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .import-block { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1rem 1.25rem; }
        .import-header { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #343a40; }
        .import-meta { font-size: 0.85rem; color: #6c757d; font-weight: normal; margin-left: 0.5rem; }
        .badge-hard { background-color: #0d6efd; }
        .badge-soft { background-color: #20c997; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width: 960px;">

    <h1 class="mb-1 fw-bold">Students XML Processor</h1>
    <p class="text-muted mb-4">Spring Boot · JAXB · PostgreSQL</p>

    <!-- Upload form -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header fw-semibold">Загрузить XML-файл</div>
        <div class="card-body">
            <form method="post" action="/upload" enctype="multipart/form-data">
                <div class="input-group">
                    <input type="file" name="file" accept=".xml" class="form-control" required>
                    <button type="submit" class="btn btn-primary px-4">Импортировать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(imports)}" class="alert alert-info">
        Нет импортов. Загрузите XML-файл для начала работы.
    </div>

    <!-- Imports -->
    <div th:each="imp : ${imports}" class="import-block mb-3 shadow-sm">
        <div class="import-header">
            Импорт #<span th:text="${imp.id}"></span>
            &nbsp;·&nbsp;
            <span th:text="${imp.fileName}"></span>
            <span class="import-meta"
                  th:text="${#temporals.format(imp.importedAt, 'dd.MM.yyyy HH:mm:ss')}"></span>
        </div>

        <div th:if="${#lists.isEmpty(imp.students)}" class="text-muted fst-italic small">
            Нет студентов в этом импорте.
        </div>

        <table th:unless="${#lists.isEmpty(imp.students)}"
               class="table table-bordered table-hover table-sm mb-0">
            <thead class="table-dark">
                <tr>
                    <th style="width:40px">#</th>
                    <th>Имя</th>
                    <th>Фамилия</th>
                    <th>Hard skills</th>
                    <th>Soft skills</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student, iter : ${imp.students}">
                    <td class="text-center text-muted" th:text="${iter.count}"></td>
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.secondName}"></td>
                    <td>
                        <th:block th:each="skill : ${student.skills}" th:if="${skill.isHard}">
                            <span class="badge badge-hard" th:text="${skill.name}"></span>
                        </th:block>
                        <span th:if="${student.hardSkills.isEmpty()}" class="text-muted">—</span>
                    </td>
                    <td>
                        <th:block th:each="skill : ${student.skills}" th:unless="${skill.isHard}">
                            <span class="badge badge-soft" th:text="${skill.name}"></span>
                        </th:block>
                        <span th:if="${student.softSkills.isEmpty()}" class="text-muted">—</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
